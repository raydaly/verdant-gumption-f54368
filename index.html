<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F9F7F2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
  <title>Greatuncle</title>
  <link rel="manifest" href="/manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="horizon-bar"></div>
  <div id="sw-update-banner" hidden>
    New version available
    <button onclick="window.location.reload()">Refresh</button>
  </div>

  <div id="app"></div>

  <nav id="tab-bar" hidden>
    <button class="tab-btn" data-tab="home" aria-label="Home">
      <span>🏠</span>
      <span>Home</span>
    </button>
    <button class="tab-btn" data-tab="people" aria-label="People">
      <span>👥</span>
      <span>People</span>
    </button>
    <button class="tab-btn" data-tab="journal" aria-label="Journal">
      <span>📓</span>
      <span>Journal</span>
    </button>
    <button class="tab-btn" data-tab="backup" aria-label="The Trunk">
      <span>🌿</span>
      <span>Trunk</span>
    </button>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function (registration) {
        registration.addEventListener('updatefound', function () {
          var newWorker = registration.installing;
          newWorker.addEventListener('statechange', function () {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              window.dispatchEvent(new CustomEvent('swUpdateAvailable'));
            }
          });
        });
      });

      window.addEventListener('swUpdateAvailable', function () {
        var banner = document.getElementById('sw-update-banner');
        banner.removeAttribute('hidden');
      });
    }
  </script>

  <script>console.log("HTML loading v26");</script>
  <script type="module" src="/src/ui/app.js"></script>
</body>
</html>
